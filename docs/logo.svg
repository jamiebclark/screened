<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 160">
  <rect width="860" height="160" fill="#0f0f13" rx="12"/>

  <!-- Screen frame -->
  <rect x="48" y="24" width="128" height="88" rx="6" fill="none" stroke="#e11d48" stroke-width="3"/>
  <!-- Screen surface -->
  <rect x="60" y="34" width="104" height="68" rx="2" fill="#18181f"/>
  <!-- Play triangle -->
  <polygon points="97,52 97,84 133,68" fill="#e11d48"/>
  <!-- Stand legs -->
  <line x1="112" y1="112" x2="96" y2="136" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="112" y1="112" x2="128" y2="136" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Base crossbar -->
  <line x1="86" y1="136" x2="138" y2="136" stroke="#e11d48" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="210" y="98"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" letter-spacing="-2" fill="#f0f0f5">Screened</text>

  <!-- Tagline -->
  <text x="212" y="126"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="15" letter-spacing="3" fill="#a0a0ab">SELF-HOSTED MOVIE &amp; TV TRACKER</text>
</svg>
