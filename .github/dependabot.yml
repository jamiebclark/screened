version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript*"
          - "@types/*"
          - "vitest*"
          - "@vitest/*"
          - "@playwright/*"
