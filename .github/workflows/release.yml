name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.version.outputs.new }}
      version-changed: ${{ steps.version.outputs.changed }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile --ignore-engines

      - name: Capture version before release
        id: before
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        run: yarn semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture version after release
        id: version
        run: |
          NEW=$(node -p "require('./package.json').version")
          echo "new=$NEW" >> $GITHUB_OUTPUT
          if [ "${{ steps.before.outputs.version }}" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version-changed == 'true'

    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch the commit that semantic-release just pushed (updated package.json)
          ref: main
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            jamiebclark/screened:latest
            jamiebclark/screened:${{ needs.release.outputs.new-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
