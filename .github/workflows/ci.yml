name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Migrate, schema check, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: screened_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d screened_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/screened_ci
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prisma_shadow_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile --ignore-engines

      - name: Apply migrations (same as production entrypoint)
        run: yarn prisma migrate deploy

      # Prisma migrate diff needs SHADOW_DATABASE_URL to point at an existing DB on the server.
      # The Postgres service only creates POSTGRES_DB (screened_ci); create the shadow DB explicitly.
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create Prisma shadow database
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'prisma_shadow_ci'" | grep -q 1 || \
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE prisma_shadow_ci;"

      - name: Assert migrations match schema.prisma
        run: yarn prisma migrate diff --from-migrations prisma/migrations --to-schema prisma/schema.prisma --exit-code

      - run: yarn db:generate

      - name: Build Next.js app
        run: yarn build
        env:
          # Same DB as migrate steps (Prisma / RSC may touch DB during build).
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/screened_ci
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prisma_shadow_ci
          AUTH_SECRET: ci-build-placeholder-min-32-chars-long!!
          NEXTAUTH_URL: http://localhost:3000
          TMDB_API_KEY: "00000000000000000000000000000000"
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CRON_SECRET: ci-cron-placeholder-secret-min-32-chars-xx
