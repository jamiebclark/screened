services:
  app:
    image: jamiebclark/screened:latest
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://movienight:movienight@db:5432/movienightdb?schema=public"
      AUTH_SECRET: "${AUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      SYNC_CRON_SCHEDULE: "${SYNC_CRON_SCHEDULE:-0 */6 * * *}"
      SYNC_INTERVAL_HOURS: "${SYNC_INTERVAL_HOURS}"
      SITE_ADMIN_EMAILS: "${SITE_ADMIN_EMAILS}"
      ALLOW_PUBLIC_SIGNUP: "${ALLOW_PUBLIC_SIGNUP}"
      STREAMING_COUNTRY: "${STREAMING_COUNTRY}"
      OMDB_API_KEY: "${OMDB_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      TRAKT_CLIENT_ID: "${TRAKT_CLIENT_ID}"
      TRAKT_CLIENT_SECRET: "${TRAKT_CLIENT_SECRET}"
      DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID}"
      DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY}"
      DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_CLIENT_SECRET: "${DISCORD_CLIENT_SECRET}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movienight
      POSTGRES_PASSWORD: movienight
      POSTGRES_DB: movienightdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movienight -d movienightdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-backup:
    image: postgres:16-alpine
    volumes:
      - "${BACKUP_PATH:-./backups}:/backups"
    environment:
      PGHOST: "db"
      PGUSER: "movienight"
      PGPASSWORD: "movienight"
      PGDATABASE: "movienightdb"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          echo "[db-backup] $$(date -u '+%Y-%m-%dT%H:%M:%SZ') Running backup..."
          pg_dump | gzip > /backups/screened-$$(date +%Y%m%d-%H%M%S).sql.gz
          find /backups -name "screened-*.sql.gz" -mtime +7 -delete
          echo "[db-backup] Done. Next backup in 24h."
          sleep 86400
        done

volumes:
  postgres_data:
